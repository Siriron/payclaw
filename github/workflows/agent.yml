name: PayClaw AI Agent

on:
  schedule:
    - cron: '0 9 1,31 * *'
  workflow_dispatch:
    inputs:
      note:
        description: 'Payment note e.g. April 2026 Cycle'
        required: false
        default: ''

jobs:
  payclaw-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ethers @google/generative-ai

      - name: Run PayClaw Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
          RUN_NOTE: ${{ github.event.inputs.note || '' }}
        run: node payclaw_agent.js

      - name: Commit payments.json
        run: |
          git config user.name "PayClaw Agent"
          git config user.email "agent@payclaw.app"
          git add payments.json
          git diff --staged --quiet || git commit -m "agent: cycle update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
