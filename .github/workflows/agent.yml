name: PayClaw AI Agent

on:
  schedule:
    # Runs every 30 days at 09:00 UTC
    # Day 1 and Day 31 of each month
    - cron: '0 9 1,31 * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions tab
    inputs:
      note:
        description: 'Payment note (e.g. "April 2026 Cycle")'
        required: false
        default: 'Manual run'

jobs:
  payclaw-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ethers @google/generative-ai

      - name: Run PayClaw Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
          CONTRACT_ADDRESS: '0x6263d965f8753cdEE92CCCC53e2C2B1066287f63'
          ARC_RPC: 'https://rpc.testnet.arc.network'
          RUN_NOTE: ${{ github.event.inputs.note || '' }}
        run: |
          cat << 'AGENT_EOF' > agent.js
          const { ethers } = require('ethers');
          const { GoogleGenerativeAI } = require('@google/generative-ai');

          // ── CONFIG ────────────────────────────────────────
          const CONTRACT = process.env.CONTRACT_ADDRESS;
          const RPC      = process.env.ARC_RPC;
          const NOTE     = process.env.RUN_NOTE || '';

          const ABI = [
            "function getContractBalance() view returns (uint256)",
            "function workerCount() view returns (uint256)",
            "function getWorker(uint256) view returns (tuple(string name, address wallet, uint256 salaryPerCycle, bool isActive, uint256 totalPaid, uint256 lastPaidAt))",
            "function getTotalPayrollNeeded() view returns (uint256)",
            "function processAllPayouts(string note) nonpayable",
            "function getTotalPayments() view returns (uint256)",
            "function getPayment(uint256) view returns (tuple(uint256 workerId, address wallet, uint256 amount, uint256 timestamp, string note))"
          ];

          // ── HELPERS ───────────────────────────────────────
          const fmt18 = (n) => (Number(n) / 1e18).toFixed(2);
          const short  = (a) => a ? `${a.slice(0,6)}...${a.slice(-4)}` : '—';

          async function run() {
            console.log('🤖 PayClaw Agent starting...');
            console.log(`📍 Contract: ${CONTRACT}`);
            console.log(`🌐 RPC: ${RPC}`);

            // ── Connect to Arc Testnet ────────────────────
            const provider = new ethers.JsonRpcProvider(RPC);
            const wallet   = new ethers.Wallet(process.env.WALLET_PRIVATE_KEY, provider);
            const contract = new ethers.Contract(CONTRACT, ABI, wallet);

            console.log(`👛 Agent wallet: ${wallet.address}`);

            // ── Read contract state ───────────────────────
            const [balance, wCount, needed, totalPay] = await Promise.all([
              contract.getContractBalance(),
              contract.workerCount(),
              contract.getTotalPayrollNeeded(),
              contract.getTotalPayments()
            ]);

            const balUSDC    = fmt18(balance);
            const neededUSDC = fmt18(needed);
            const count      = Number(wCount);
            const payments   = Number(totalPay);

            console.log(`\n📊 Contract State:`);
            console.log(`   Balance:  ${balUSDC} USDC`);
            console.log(`   Workers:  ${count}`);
            console.log(`   Needed:   ${neededUSDC} USDC`);
            console.log(`   Past payments: ${payments}`);

            // Load workers
            const workers = [];
            for (let i = 0; i < count; i++) {
              const w = await contract.getWorker(i);
              workers.push({
                id: i,
                name: w.name,
                wallet: w.wallet,
                salary: fmt18(w.salaryPerCycle),
                isActive: w.isActive,
                totalPaid: fmt18(w.totalPaid),
                lastPaidAt: Number(w.lastPaidAt)
              });
            }

            const activeWorkers = workers.filter(w => w.isActive);
            console.log(`\n👷 Active workers: ${activeWorkers.length}`);
            activeWorkers.forEach(w => console.log(`   ${w.name} (${short(w.wallet)}) — ${w.salary} USDC`));

            // ── Ask Gemini AI whether to pay ──────────────
            const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
            const model = genAI.getGenerativeModel({ model: 'gemini-1.5-flash' });

            const now = new Date().toISOString();
            const lastPayTimestamp = workers.length > 0
              ? Math.max(...workers.filter(w=>w.lastPaidAt>0).map(w=>w.lastPaidAt))
              : 0;
            const daysSincePay = lastPayTimestamp > 0
              ? Math.floor((Date.now()/1000 - lastPayTimestamp) / 86400)
              : 999;

            const prompt = `
You are the autonomous payment agent for PayClaw, an onchain payroll system on Arc Testnet.

Current state:
- Date/time: ${now}
- Contract balance: ${balUSDC} USDC
- Total payroll needed: ${neededUSDC} USDC
- Active workers: ${activeWorkers.length}
- Days since last payment: ${daysSincePay}
- Past payments made: ${payments}

Workers:
${activeWorkers.map(w => `  - ${w.name}: ${w.salary} USDC/cycle`).join('\n')}

Rules:
1. Pay if balance >= needed AND days since last pay >= 28
2. Do NOT pay if balance < needed (insufficient funds)
3. Do NOT pay if last payment was less than 28 days ago
4. Always pay if this is the first ever payment (payments === 0) and balance >= needed

Respond with ONLY a JSON object, no markdown, no explanation:
{
  "shouldPay": true or false,
  "reason": "one sentence explanation",
  "note": "payment note to record onchain e.g. 'April 2026 Payroll · Arc Testnet'"
}`;

            const result = await model.generateContent(prompt);
            const text   = result.response.text().trim();

            let decision;
            try {
              const clean = text.replace(/```json|```/g, '').trim();
              decision = JSON.parse(clean);
            } catch(e) {
              console.error('Failed to parse Gemini response:', text);
              decision = { shouldPay: false, reason: 'Gemini parse error', note: '' };
            }

            console.log(`\n🤖 Gemini decision:`);
            console.log(`   Should pay: ${decision.shouldPay}`);
            console.log(`   Reason: ${decision.reason}`);
            console.log(`   Note: ${decision.note}`);

            if (!decision.shouldPay) {
              console.log('\n⏸  Agent decided NOT to pay this cycle.');
              await updatePaymentsJson(workers, balUSDC, neededUSDC, payments, decision.reason, false, null);
              return;
            }

            // ── Execute payment ────────────────────────────
            console.log('\n💸 Executing payroll...');
            const payNote = NOTE || decision.note || `PayClaw Payroll · ${new Date().toLocaleString('en-US',{month:'long',year:'numeric'})} · Arc Testnet`;

            const tx = await contract.processAllPayouts(payNote);
            console.log(`   TX submitted: ${tx.hash}`);
            const receipt = await tx.wait();
            console.log(`   ✅ Confirmed in block ${receipt.blockNumber}`);

            // ── Update payments.json ────────────────────────
            await updatePaymentsJson(workers, balUSDC, neededUSDC, payments + 1, decision.reason, true, tx.hash);
            console.log('\n✅ PayClaw Agent complete.');
          }

          async function updatePaymentsJson(workers, balance, needed, totalPayments, reason, paid, txHash) {
            const fs = require('fs');
            let existing = {};
            try { existing = JSON.parse(fs.readFileSync('payments.json','utf8')); } catch(e) {}

            const cycleNum = (existing.cycle || 0) + (paid ? 1 : 0);
            const now = new Date();
            const nextCycle = new Date(now.getTime() + 30*24*60*60*1000);

            const updated = {
              cycle: cycleNum,
              cycle_date: now.toISOString().split('T')[0],
              next_cycle: nextCycle.toISOString().split('T')[0],
              last_payment_tx: txHash || existing.last_payment_tx || null,
              agent_decision: reason,
              paid_this_run: paid,
              contract_balance: balance,
              payroll_needed: needed,
              note: paid ? `Cycle ${cycleNum} · AI agent executed · Arc Testnet` : `Cycle ${cycleNum} · No payment this run · ${reason}`,
              recipients: existing.recipients || []
            };

            fs.writeFileSync('payments.json', JSON.stringify(updated, null, 2));
            console.log(`\n📄 payments.json updated (cycle ${cycleNum})`);
          }

          run().catch(e => {
            console.error('Agent error:', e.message);
            process.exit(1);
          });
          AGENT_EOF
          node agent.js

      - name: Commit updated payments.json
        run: |
          git config user.name  "PayClaw Agent"
          git config user.email "agent@payclaw.app"
          git add payments.json
          git diff --staged --quiet || git commit -m "agent: cycle update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
